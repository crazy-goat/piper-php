name: CI

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: ffi
        
    - name: Install dependencies
      run: composer update --prefer-dist --no-progress
      
    - name: Run PHP_CodeSniffer
      run: composer cs
      
    - name: Run PHPStan
      run: composer phpstan
      
    - name: Run Rector (dry-run)
      run: composer rector

  build-piper-glibc:
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config python3-pip
        pip3 install cmake>=3.26
        cmake --version
        
    - name: Build Piper
      run: |
        make build-libpiper 2>&1 | tee build.log
        exit_code=$?
        if [ $exit_code -ne 0 ]; then
          echo "=== BUILD FAILED ==="
          cat build.log
          exit $exit_code
        fi
      shell: bash
      
    - name: Strip debug symbols
      run: |
        strip --strip-debug piper1-gpl/libpiper/build/libpiper.so
        find piper1-gpl/libpiper/build/piper1-gpl/libpiper/install/lib -name "libonnxruntime.so.*" -type f -exec strip --strip-debug {} + 2>/dev/null || true
      
    - name: Package build artifacts
      run: |
        tar -czf libpiper-linux-x86_64.tar.gz -C piper1-gpl/libpiper/build libpiper.so
        mkdir -p /tmp/onnx && find piper1-gpl/libpiper/build/onnxruntime/lib -name "libonnxruntime*.so*" -exec cp -L {} /tmp/onnx/ \; && tar -czf libonnxruntime-linux-x86_64.tar.gz -C /tmp/onnx .
        tar -czf espeak-ng-data.tar.gz -C piper1-gpl/libpiper/build/piper1-gpl/libpiper/install espeak-ng-data
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: piper-build-glibc
        path: |
          piper1-gpl/libpiper/build/libpiper.so
          piper1-gpl/libpiper/build/piper1-gpl/libpiper/install/lib/libonnxruntime.so
          piper1-gpl/libpiper/build/piper1-gpl/libpiper/install/espeak-ng-data
        retention-days: 7

    - name: Upload packaged artifacts
      uses: actions/upload-artifact@v4
      with:
        name: piper-release-glibc
        path: |
          libpiper-linux-x86_64.tar.gz
          libonnxruntime-linux-x86_64.tar.gz
          espeak-ng-data.tar.gz
        retention-days: 7

  build-piper-musl:
    runs-on: ubuntu-latest
    needs: lint
    container: alpine:3.18
    
    steps:
    - name: Install git and build dependencies
      run: |
        apk add --no-cache cmake build-base git linux-headers pkgconfig
        
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Build Piper
      run: make build-libpiper
      
    - name: Strip debug symbols
      run: |
        strip --strip-debug piper1-gpl/libpiper/build/libpiper.so
        find piper1-gpl/libpiper/build/piper1-gpl/libpiper/install/lib -name "libonnxruntime.so.*" -type f -exec strip --strip-debug {} + 2>/dev/null || true
      
    - name: Package build artifacts
      run: |
        tar -czf libpiper-linux-musl-x86_64.tar.gz -C piper1-gpl/libpiper/build libpiper.so
        mkdir -p /tmp/onnx && find piper1-gpl/libpiper/build/onnxruntime/lib -name "libonnxruntime*.so*" -exec cp -L {} /tmp/onnx/ \; && tar -czf libonnxruntime-linux-musl-x86_64.tar.gz -C /tmp/onnx .
        
    - name: Upload packaged artifacts
      uses: actions/upload-artifact@v4
      with:
        name: piper-release-musl
        path: |
          libpiper-linux-musl-x86_64.tar.gz
          libonnxruntime-linux-musl-x86_64.tar.gz
        retention-days: 7

  test-unit:
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: ffi
        
    - name: Install dependencies
      run: composer update --prefer-dist --no-progress
      
    - name: Run unit tests
      run: vendor/bin/phpunit --testsuite unit

  test-integration:
    runs-on: ubuntu-latest
    needs: [lint, build-piper-glibc]
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: ffi
        
    - name: Install dependencies
      run: composer update --prefer-dist --no-progress
        
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: piper-build-glibc
        path: piper1-gpl/libpiper/build
        
    - name: Copy libraries to libs/
      run: |
        mkdir -p libs
        cp piper1-gpl/libpiper/build/libpiper.so libs/
        cp piper1-gpl/libpiper/build/piper1-gpl/libpiper/install/lib/libonnxruntime.so* libs/
        cp -r piper1-gpl/libpiper/build/piper1-gpl/libpiper/install/espeak-ng-data libs/
        
    - name: Cache voice model
      uses: actions/cache@v4
      with:
        path: models/
        key: voice-model-en-us-lessac-low-v1
        
    - name: Download test voice model
      run: make test-model
      
    - name: Run integration tests
      run: vendor/bin/phpunit --group integration

  release:
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration, build-piper-musl]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v4

    - name: Download glibc artifacts
      uses: actions/download-artifact@v4
      with:
        name: piper-release-glibc
        
    - name: Download musl artifacts
      uses: actions/download-artifact@v4
      with:
        name: piper-release-musl
        
    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --notes "Release ${{ github.ref_name }}" || true
        gh release upload ${{ github.ref_name }} libpiper-linux-x86_64.tar.gz --clobber
        gh release upload ${{ github.ref_name }} libonnxruntime-linux-x86_64.tar.gz --clobber
        gh release upload ${{ github.ref_name }} espeak-ng-data.tar.gz --clobber
        gh release upload ${{ github.ref_name }} libpiper-linux-musl-x86_64.tar.gz --clobber
        gh release upload ${{ github.ref_name }} libonnxruntime-linux-musl-x86_64.tar.gz --clobber
