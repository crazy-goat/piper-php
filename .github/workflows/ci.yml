name: CI

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: ffi
        
    - name: Install dependencies
      run: composer install --prefer-dist --no-progress
      
    - name: Run PHP_CodeSniffer
      run: composer cs
      
    - name: Run PHPStan
      run: composer phpstan
      
    - name: Run Rector (dry-run)
      run: composer rector

  test:
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: ffi
        
    - name: Install dependencies
      run: composer install --prefer-dist --no-progress
        
    - name: Check PHP syntax
      run: |
        php -l src/*.php
        php -l src/Exception/*.php
        php -l examples/*.php
        php -l bin/piper-tts

  build-piper:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential pkg-config
        
    - name: Cache build
      uses: actions/cache@v3
      with:
        path: piper1-gpl/libpiper/build
        key: ${{ runner.os }}-piper-build-${{ hashFiles('piper1-gpl/libpiper/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-piper-build-
          
    - name: Build Piper
      run: make build-libpiper
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: piper-build
        path: |
          piper1-gpl/libpiper/build/libpiper.so
          piper1-gpl/libpiper/build/piper1-gpl/libpiper/install/lib/libonnxruntime.so
          piper1-gpl/libpiper/build/piper1-gpl/libpiper/install/espeak-ng-data
        retention-days: 7
